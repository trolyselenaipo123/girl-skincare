<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="theme-color" content="#e8b8e7" />
  <meta name="description" content="Trang trưng bày minh họa cô gái trước gương, tối ưu để triển khai bằng GitHub Pages." />

  <meta property="og:title" content="Mirror Morning Illustration" />
  <meta property="og:description" content="Một trang web trưng bày tranh minh họa phong cách anime pastel." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="assets/illustration.png" />

  <title>Mirror Morning Illustration</title>
  <link rel="preload" href="assets/illustration.png" as="image" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="page-shell">
    <section class="art-card" aria-label="Tranh minh họa cô gái trước gương">
      <div class="ambient ambient-one" aria-hidden="true"></div>
      <div class="ambient ambient-two" aria-hidden="true"></div>

      <figure class="art-frame" id="artFrame">
        <img
          id="artImage"
          src="assets/illustration.png"
          alt="Cô gái phong cách anime đang chăm sóc da trước gương trong phòng tắm màu hồng tím"
          width="831"
          height="1024"
          decoding="async"
          fetchpriority="high"
        />
        <span class="soft-glare" aria-hidden="true"></span>
      </figure>

      <div class="controls" aria-label="Điều khiển hình ảnh">
        <button class="control-button" id="zoomButton" type="button" aria-pressed="false">
          Phóng to
        </button>
        <a class="control-button control-link" href="assets/illustration.png" download="mirror-morning-illustration.png">
          Tải ảnh
        </a>
      </div>
    </section>
  </main>

  <div class="lightbox" id="lightbox" hidden>
    <button class="lightbox-close" id="closeLightbox" type="button" aria-label="Đóng ảnh phóng to">×</button>
    <img src="assets/illustration.png" alt="Bản phóng to của tranh minh họa" />
  </div>

  <script src="script.js" defer></script>
</body>
</html>
